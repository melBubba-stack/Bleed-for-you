<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider Lily for Melody</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #0a0a0a, #1b1b1b);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Georgia', serif;
    position: relative;
    color: white;
  }

  /* Tap to start overlay */
  #startScreen {
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    font-size:26px;
    text-align:center;
    z-index:20;
  }

  /* Flower container */
  #flowerContainer {
    position: relative;
    width: 400px;
    height: 400px;
    z-index:5;
  }

  #flowerContainer img, #flowerContainer video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 10px;
  }

  /* Glow behind flower */
  .glow {
    position:absolute;
    width:500px; height:500px;
    top:-50px; left:-50px;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent 70%);
    border-radius:50%;
    animation: pulse 5s infinite;
    z-index:0;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); opacity:0.2; }
    50% { transform: scale(1.5); opacity:0.5; }
  }

  /* Falling petals */
  .falling-petal {
    position:absolute;
    width:12px;
    height:60px;
    background: linear-gradient(180deg, #fff0f5, #ff69b4);
    border-radius:50% 50% 0 0;
    top:-100px;
    opacity:0.8;
    z-index:2;
    animation: fall 8s linear infinite;
  }

  @keyframes fall {
    0% {transform: translateX(0) rotate(0deg); opacity:1;}
    50% {transform: translateX(50px) rotate(45deg);}
    100% {transform: translateX(-50px) translateY(700px) rotate(90deg); opacity:0;}
  }

  /* Fireflies */
  .firefly {
    position:absolute;
    width:4px;
    height:4px;
    background: rgba(255,255,200,0.8);
    border-radius:50%;
    box-shadow:0 0 6px 3px rgba(255,255,200,0.8);
    z-index:1;
    animation: drift 20s linear infinite;
  }

  @keyframes drift {
    0% {transform: translate(0px,0px);}
    50% {transform: translate(30px, -20px);}
    100% {transform: translate(-30px, 20px);}
  }

  /* Quotes */
  .quote {
    position:absolute;
    width:80%;
    text-align:center;
    top:10%;
    left:10%;
    font-size:28px;
    color:#fff;
    opacity:0;
    transition: opacity 3s ease-in-out;
    z-index:10;
    text-shadow: 0 0 15px rgba(255,255,255,0.3);
  }

  /* Final I love you */
  .final-love {
    position:absolute;
    width:80%;
    text-align:center;
    top:40%;
    left:10%;
    font-size:36px;
    font-weight:bold;
    color:#ff69b4;
    opacity:0;
    text-shadow: 0 0 20px rgba(255,105,180,0.6);
    transition: opacity 4s ease-in-out;
    z-index:15;
    animation: pulseLove 2s infinite alternate;
  }

  @keyframes pulseLove {
    from {text-shadow: 0 0 10px rgba(255,105,180,0.5);}
    to {text-shadow: 0 0 25px rgba(255,105,180,0.8);}
  }

</style>
</head>
<body>

<div id="startScreen">🌸 Tap to start the Spider Lily for Melody 🌸</div>

<audio id="bgMusic" loop>
  <source src="soft_music.mp3" type="audio/mpeg">
</audio>

<div class="glow"></div>

<!-- Flower -->
<div id="flowerContainer">
  <!-- Replace with real image or video -->
  <img src="spider_lily.jpg" alt="Spider Lily">
  <!-- or use <video src="spider_lily.mp4" autoplay muted loop></video> -->
</div>

<!-- Fireflies -->
<div id="firefliesContainer"></div>

<!-- Falling petals container -->
<div id="fallingContainer"></div>

<!-- Quotes -->
<div class="quote" id="quote1">"Two people can both be pouring… and still feel thirsty."</div>
<div class="quote" id="quote2">"Even the tiniest bloom can light up the darkest night."</div>
<div class="quote" id="quote3">"Some hearts speak without words."</div>

<!-- Final love message -->
<div class="final-love" id="finalLove">Melody… I love you.</div>

<script>
  const startScreen = document.getElementById('startScreen');
  const music = document.getElementById('bgMusic');

  startScreen.addEventListener('click', ()=>{
    music.play();
    startScreen.style.display='none';
  });

  // Falling petals
  const container = document.getElementById('fallingContainer');
  for(let i=0;i<40;i++){
    const p = document.createElement('div');
    p.classList.add('falling-petal');
    p.style.left = Math.random()*window.innerWidth + 'px';
    p.style.animationDelay = (Math.random()*12)+'s';
    container.appendChild(p);
  }

  // Fireflies
  const firefliesContainer = document.getElementById('firefliesContainer');
  for(let i=0;i<25;i++){
    const f = document.createElement('div');
    f.classList.add('firefly');
    f.style.left = Math.random()*window.innerWidth+'px';
    f.style.top = Math.random()*window.innerHeight+'px';
    f.style.animationDuration = (15 + Math.random()*10)+'s';
    firefliesContainer.appendChild(f);
  }

  // Quotes cycle
  const quotes = document.querySelectorAll('.quote');
  let current = 0;
  function showQuote(){
    if(current < quotes.length){
      quotes.forEach((q,i)=>q.style.opacity=i===current?1:0);
      current++;
    } else {
      // Show final love message
      document.getElementById('finalLove').style.opacity=1;
    }
  }
  setInterval(showQuote, 9000);
  showQuote();

</script>
</body>
</html>
