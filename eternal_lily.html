<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider Lily for Melody</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #1b1b1b, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .flower {
    position: relative;
    width: 0;
    height: 0;
  }

  .petal {
    position: absolute;
    width: 8px;
    height: 150px;
    background: linear-gradient(180deg, #fffbfa, #ffb6c1);
    border-radius: 50% 50% 0 0;
    transform-origin: bottom center;
    opacity: 0;
    animation: bloom 4s forwards;
  }

  /* Animate each petal individually */
  .petal:nth-child(1) { transform: rotate(0deg); animation-delay: 0s; }
  .petal:nth-child(2) { transform: rotate(30deg); animation-delay: 0.3s; }
  .petal:nth-child(3) { transform: rotate(60deg); animation-delay: 0.6s; }
  .petal:nth-child(4) { transform: rotate(90deg); animation-delay: 0.9s; }
  .petal:nth-child(5) { transform: rotate(120deg); animation-delay: 1.2s; }
  .petal:nth-child(6) { transform: rotate(150deg); animation-delay: 1.5s; }
  .petal:nth-child(7) { transform: rotate(180deg); animation-delay: 1.8s; }
  .petal:nth-child(8) { transform: rotate(210deg); animation-delay: 2.1s; }
  .petal:nth-child(9) { transform: rotate(240deg); animation-delay: 2.4s; }
  .petal:nth-child(10) { transform: rotate(270deg); animation-delay: 2.7s; }
  .petal:nth-child(11) { transform: rotate(300deg); animation-delay: 3s; }
  .petal:nth-child(12) { transform: rotate(330deg); animation-delay: 3.3s; }

  @keyframes bloom {
    0% { height: 0; opacity: 0; }
    50% { height: 150px; opacity: 1; }
    100% { transform: rotate(var(--angle)) sway(1s infinite); }
  }

  /* Sway animation */
  @keyframes sway {
    0%, 100% { transform: rotate(var(--angle)); }
    50% { transform: rotate(calc(var(--angle) + 5deg)); }
  }

  /* Glowing effect */
  .glow {
    position: absolute;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent 70%);
    border-radius: 50%;
    animation: pulse 3s infinite;
    top: -75px;
    left: -75px;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.2; }
    50% { transform: scale(1.3); opacity: 0.5; }
  }
</style>
</head>
<body>
  <div class="flower">
    <div class="glow"></div>
    <div class="petal" style="--angle:0deg;"></div>
    <div class="petal" style="--angle:30deg;"></div>
    <div class="petal" style="--angle:60deg;"></div>
    <div class="petal" style="--angle:90deg;"></div>
    <div class="petal" style="--angle:120deg;"></div>
    <div class="petal" style="--angle:150deg;"></div>
    <div class="petal" style="--angle:180deg;"></div>
    <div class="petal" style="--angle:210deg;"></div>
    <div class="petal" style="--angle:240deg;"></div>
    <div class="petal" style="--angle:270deg;"></div>
    <div class="petal" style="--angle:300deg;"></div>
    <div class="petal" style="--angle:330deg;"></div>
  </div>

  <script>
    const petals = document.querySelectorAll('.petal');
    petals.forEach(petal => {
      let angle = parseInt(petal.style.getPropertyValue('--angle'));
      let sway = () => {
        petal.style.transform = `rotate(${angle + Math.sin(Date.now()/1000)*5}deg)`;
        requestAnimationFrame(sway);
      }
      sway();
    });
  </script>
</body>
</html>
