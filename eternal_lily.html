<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Melody ❤️</title>
<style>
  body {
    margin:0;
    padding:0;
    overflow:hidden;
    height:100vh;
    width:100vw;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #ff9a9e, #fad0c4);
    font-family:'Georgia', serif;
    position:relative;
  }

  #startScreen {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    font-size:28px;
    text-align:center;
    z-index:10;
  }

  .sparkle {
    position:absolute;
    width:10px;
    height:10px;
    background: rgba(255,255,255,0.8);
    border-radius:50%;
    box-shadow:0 0 8px 3px rgba(255,255,255,0.6);
    animation: drift 8s linear infinite;
  }

  @keyframes drift {
    0% {transform: translate(0,0);}
    50% {transform: translate(20px,-30px);}
    100% {transform: translate(-20px,30px);}
  }

  .quote {
    position:absolute;
    width:80%;
    text-align:center;
    top:15%;
    left:10%;
    font-size:28px;
    color:#fff;
    opacity:0;
    transition: opacity 3s ease-in-out;
    z-index:5;
    text-shadow:0 0 15px rgba(0,0,0,0.3);
  }

  .final-love {
    position:absolute;
    width:80%;
    text-align:center;
    top:50%;
    left:10%;
    font-size:36px;
    font-weight:bold;
    color:#ff69b4;
    opacity:0;
    text-shadow: 0 0 20px rgba(255,105,180,0.6);
    transition: opacity 4s ease-in-out;
    z-index:5;
    animation: pulseLove 2s infinite alternate;
  }

  @keyframes pulseLove {
    from {text-shadow:0 0 10px rgba(255,105,180,0.5);}
    to {text-shadow:0 0 25px rgba(255,105,180,0.8);}
  }

</style>
</head>
<body>

<div id="startScreen">🌟 Tap to start for Melody 🌟</div>

<audio id="bgMusic" loop>
  <source src="soft_music.mp3" type="audio/mpeg">
</audio>

<!-- Sparkles container -->
<div id="sparklesContainer"></div>

<!-- Quotes -->
<div class="quote" id="quote1">"Some smiles can light up a whole universe."</div>
<div class="quote" id="quote2">"Even little moments can be magic."</div>
<div class="quote" id="quote3">"Every heartbeat says something words can't."</div>

<!-- Final love message -->
<div class="final-love" id="finalLove">Melody… I love you.</div>

<script>
  const startScreen = document.getElementById('startScreen');
  const music = document.getElementById('bgMusic');

  startScreen.addEventListener('click', ()=>{
    music.play();
    startScreen.style.display='none';
  });

  // Sparkles
  const sparklesContainer = document.getElementById('sparklesContainer');
  for(let i=0;i<30;i++){
    const s = document.createElement('div');
    s.classList.add('sparkle');
    s.style.left = Math.random()*window.innerWidth+'px';
    s.style.top = Math.random()*window.innerHeight+'px';
    s.style.animationDuration = (5 + Math.random()*5)+'s';
    sparklesContainer.appendChild(s);
  }

  // Quotes cycle
  const quotes = document.querySelectorAll('.quote');
  let current = 0;
  function showQuote(){
    if(current < quotes.length){
      quotes.forEach((q,i)=>q.style.opacity=i===current?1:0);
      current++;
    } else {
      document.getElementById('finalLove').style.opacity=1;
    }
  }
  setInterval(showQuote, 8000);
  showQuote();

</script>
</body>
</html>
